<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https://*.openstreetmap.org https://mt1.google.com https://unpkg.com https://www.ikarisuper.com; connect-src 'self';">
  <title>いかりスーパー周辺 競合環境マップ</title>
  <!-- Google Fonts: Outfit, Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <style>
    :root {
      --primary: #004628;      /* いかりスーパーの深緑 */
      --accent: #C5A059;       /* 落ち着いたブラスゴールド */
      --bg-base: #f4f5f6;      /* 極淡クールグレー */
      --text-main: #2c3e35;    /* 濃いスレートグレー */
      --text-muted: #6b7a72;
      --border-color: rgba(197, 160, 89, 0.3);
      --font-title: 'Outfit', 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .header-logo { display: flex; align-items: center; gap: 15px; }
    .header-logo i { color: var(--primary); font-size: 26px; }
    
    .header-logo h1 {
      font-family: var(--font-title); font-size: 22px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--primary);
    }
    
    .header-meta { font-size: 14px; color: var(--text-muted); font-weight: 500; }

    .app-container {
      flex: 1; width: 100%; position: relative; overflow: hidden;
    }

    #map { width: 100%; height: 100%; z-index: 1; }

    /* マップのカスタムツールチップスタイル */
    .custom-map-tooltip {
      background: rgba(255, 255, 255, 0.98) !important;
      border: 1px solid var(--accent) !important;
      border-radius: 12px !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15) !important;
      padding: 0 !important;
      overflow: hidden;
      font-family: var(--font-body) !important;
      color: var(--text-main) !important;
      white-space: normal !important;
      word-wrap: break-word !important;
    }
    
    .map-tooltip {
      width: 260px;
      display: flex;
      flex-direction: column;
    }
    
    .tooltip-img-container {
      width: 100%;
      height: 140px;
      overflow: hidden;
      background: #eee;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    .tooltip-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .tooltip-title {
      font-family: var(--font-title);
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      padding: 12px 15px 6px 15px;
    }
    
    .competitor-title {
      font-size: 14px;
    }
    
    .tooltip-info {
      padding: 0 15px 12px 15px;
      font-size: 11px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .tooltip-label {
      font-weight: 700;
      color: var(--text-muted);
      margin-right: 4px;
    }
    
    .tooltip-desc {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed rgba(0,0,0,0.1);
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">
      <i class="fa-solid fa-map-location-dot"></i>
      <h1>いかりスーパー周辺 競合環境マップ</h1>
    </div>
    <div class="header-meta" id="update-date">最終更新: 2026年6月度</div>
  </header>

  <div class="app-container">
    <div id="map"></div>
  </div>

  <script>
    const REPORT_DATA = /*REPORT_DATA_PLACEHOLDER*/;
    const STORES_DATA = /*STORE_DATA_PLACEHOLDER*/;

    // HTMLエスケープ関数
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
    }

    // 1. マップの初期化
    const map = L.map('map', {
      zoomControl: false
    }).setView([34.740587, 135.311702], 12);
    
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Google Maps ロード (高解像度タイル・日本語ラベル)
    const googleRoads = L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ja&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      attribution: '&copy; Google Maps'
    }).addTo(map);

    // 2. マップ上の表示マーカー管理
    let activeMarkers = {};

    function initMap() {
      // 既存マーカーのクリア
      for (const key in activeMarkers) {
        map.removeLayer(activeMarkers[key]);
      }
      activeMarkers = {};
      
      const plotIkari = STORES_DATA.ikari_stores || {};
      
      // 3. マップ上にいかり店舗をプロット
      for (const [name, info] of Object.entries(plotIkari)) {
        const marker = L.circleMarker(info.coords, { radius: 11, fillColor: '#004628', color: '#C5A059', weight: 2, fillOpacity: 0.95 }).addTo(map);
        
        // ツールチップに写真と詳細店舗情報を表示
        const tooltipContent = `
          <div class="map-tooltip">
            ${info.image_url ? `<div class="tooltip-img-container"><img src="${escapeHtml(info.image_url)}" class="tooltip-img" alt="${escapeHtml(name)}"></div>` : ''}
            <div class="tooltip-title">${escapeHtml(name)}</div>
            <div class="tooltip-info">
              <div><span class="tooltip-label">住所:</span> ${escapeHtml(info.address || 'N/A')}</div>
              ${info.phone ? `<div><span class="tooltip-label">電話:</span> ${escapeHtml(info.phone)}</div>` : ''}
              <div><span class="tooltip-label">営業時間:</span> ${escapeHtml(info.hours || 'N/A')}</div>
              <div><span class="tooltip-label">駐車場:</span> ${escapeHtml(info.parking || 'N/A')}</div>
            </div>
          </div>
        `;
        
        marker.bindTooltip(tooltipContent, { 
          permanent: false, 
          direction: 'top',
          className: 'custom-map-tooltip',
          opacity: 0.98
        });
        
        activeMarkers['ikari_' + name] = marker;
      }
      
      // 4. 地図の自動ズーム/センタリング調整
      const allCoords = [];
      Object.values(plotIkari).forEach(info => allCoords.push(info.coords));
      if (allCoords.length > 0) {
        const bounds = L.latLngBounds(allCoords);
        map.fitBounds(bounds, { padding: [50, 50] });
      }
    }

    // ページのロード完了時にマップを初期化
    window.addEventListener('DOMContentLoaded', () => {
      initMap();
      
      // 最終更新日を設定
      const today = new Date();
      const formattedDate = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;
      document.getElementById('update-date').innerText = `更新日: ${formattedDate}`;
    });
  </script>
</body>
</html>
